name: Publish Docker Image from main

permissions:
  contents: read
  packages: write

on:
    push:
        branches:
        - main
        - workflow
    release:
        types: [published]
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: extract_version
        run: |
          # Fetch all tags
          git fetch --tags
          # Attempt to get the latest tag in the repository
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$latest_tag" ]]; then
            # Error out if no tags are found
            echo "No tags found in the repository"
            exit 1
          else
            VERSION=$latest_tag
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: |
            ghcr.io/marketknowledgecenter/mkc-invenio:latest
            ghcr.io/ingsismege/printscriptapi:${{ env.VERSION }}
          secrets: |
            username=${{ github.actor }}
            token=${{ secrets.GITHUB_TOKEN }}
